name: deployment
on:
  workflow_dispatch: # Allows manual triggering
    inputs:
      jfrog_environment:
        description: 'JFrog environment to use'
        required: true
        default: 'prod'
        type: choice
        options:
          - non_prod
          - prod
permissions:
  contents: read # Default for accessing the repo
jobs:
  publish-artifact:
    name: publish-artifact
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Set environment variables
        run: |
          if [ "${{ github.event.inputs.jfrog_environment }}" == "non_prod" ]; then
            echo "JFROG_ACCESS_TOKEN=${{ secrets.JFROG_NON_PROD_TOKEN }}" >> $GITHUB_ENV
            echo "JFROG_REPO=${{ vars.JFROG_NON_PROD_REPO }}" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.jfrog_environment }}" == "prod" ]; then
            echo "JFROG_ACCESS_TOKEN=${{ secrets.JFROG_PROD_TOKEN }}" >> $GITHUB_ENV
            echo "JFROG_REPO=${{ vars.JFROG_PROD_REPO }}" >> $GITHUB_ENV
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build artifact
        run: |
          zip -r modules.zip modules
      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
      - name: Configure JFrog Server
        run: |
          jfrog config add artifactory-server \
            --url "${{ vars.JFROG_URL }}" \
            --access-token "${JFROG_ACCESS_TOKEN}" \
            --interactive=false
          jfrog -v
      - name: Prepare artifact version
        run: |
          if [ ! -f VERSION ]; then
            echo "VERSION file not found."
            exit 1
          fi
          base_version="$(tr -d '\n\r' < VERSION)"
          if [[ -z "$base_version" ]]; then
            echo "VERSION file is empty."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            full_version="$base_version"
            echo "Release version ${full_version}"
          else
            branch_sanitized="${GITHUB_REF_NAME//\//-}"
            full_version="${base_version}-${branch_sanitized}"
            echo "Feature version ${full_version}"
          fi
          echo "VERSION=${full_version}" >> $GITHUB_ENV
      - name: Upload artifact
        run: |
          target_path="${JFROG_REPO}/bundle/bundle-${VERSION}.zip"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "Checking if ${target_path} already exists..."
            existing=$(jfrog rt s --server-id=artifactory-server "$target_path")
            if [[ -n "$existing" && "$existing" != "[]" ]]; then
              echo "Artifact already exists at ${target_path}. Aborting to avoid overwrite."
              exit 1
            fi
            jfrog rt u \
              --server-id=artifactory-server \
              --fail-no-op \
              "modules.zip" "$target_path"
          else
            jfrog rt u \
              --server-id=artifactory-server \
              --fail-no-op \
              "modules.zip" "$target_path"
          fi
